image: node:18

stages:
  - build
  - test
  - deploy

cache:
  paths:
    - node_modules/

before_script:
  - curl -sL https://deb.nodesource.com/setup_18.x | bash -
  - apt-get install -y nodejs
  - npm ci

build:
  stage: build
  tags:
    - docker  # Specify the Docker runner
  script:
    - echo "🔧 Building the React Native app..."
    - npx expo export --dev --output-dir=dist
  artifacts:
    paths:
      - dist/

test:
  stage: test
  tags:
    - docker  # Specify the Docker runner
  script:
    - echo "🧪 Running tests..."
    - npm test || echo "No tests defined"

deploy:
  tags:
    - docker  # Specify the Docker runner
  stage: deploy
  script:
    - echo "🚀 Deploying (this is just a placeholder)..."

