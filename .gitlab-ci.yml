image: node:18

stages:
  - build
  - test
  - deploy

cache:
  paths:
    - node_modules/

before_script:
  - npm ci

build:
  stage: build
  script:
    - echo "🔧 Building the React Native app..."
    - npx expo export --dev --output-dir=dist
  artifacts:
    paths:
      - dist/

test:
  stage: test
  script:
    - echo "🧪 Running tests..."
    - npm test || echo "No tests defined"

deploy:
  stage: deploy
  script:
    - echo "🚀 Deploying (this is just a placeholder)..."

