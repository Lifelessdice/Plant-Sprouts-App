image: ubuntu:latest # Use the latest official Ubuntu image as the base for all jobs

stages: # Define the stages of the pipeline
  - build
  - test
  - deploy
  
before_script: # Commands that run before each job
  # Update package list and install required tools
  - apt-get update && apt-get install -y curl unzip   
  # Download and install the Arduino CLI tool
  - curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh   
  - mv bin/arduino-cli /usr/local/bin/   
  # Initialize Arduino CLI configuration
  - arduino-cli config init   
  # Add Seeed Studio board URL
  - arduino-cli config add board_manager.additional_urls https://files.seeedstudio.com/arduino/package_seeeduino_boards_index.json 
  # Update the board index and install the Wio Terminal board
  - arduino-cli core update-index
  - arduino-cli core install Seeeduino:samd
  # Install necessary libraries for the Wio Terminal project
  - arduino-cli lib install "Seeed Arduino rpcWiFi"
  - arduino-cli lib install "PubSubClient"
  - arduino-cli lib install "Grove Temperature And Humidity Sensor"



build:
  stage: build
  tags:
    - docker
  script:
    - echo "Building Wio Terminal..." # Log message
    - export PATH=$PATH:/root/bin # Ensure CLI is on PATH 
    - pwd # Show current directory
    - cd Arduino # Enter the Arduino sketch directory
    - arduino-cli compile --fqbn Seeeduino:samd:seeed_wio_terminal # Compile the sketch for Wio Terminal

test: # Placeholder for running tests
  stage: test
  script:
    - echo "Running Wio Terminal tests..."

deploy: # Placeholder for deployment
  stage: deploy
  script:
    - echo "Deploying Wio Terminal..."

